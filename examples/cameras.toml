# Example rig: an array of cameras orbiting an object near the world origin.
# `[cameras.defaults]` is merged into every camera; per-camera keys override it.

[cameras.defaults]
focal_length_px = [22388.125, 22388.125]    # scalar is also allowed when fx == fy

# optional; omit to auto-detect each view's image center ((w-1)/2, (h-1)/2)
# needs to be specified if the principal point is not at the image center
# principal_point_px = [479.5, 239.5]

distortion_coefficients = []  # empty means no distortion
look_at = [0.0, 0.0, 0.0]
distance = 107.463
elevation_deg = 0.0
roll_deg = 0.0

[cameras.rh]
azimuth_deg = -120
[cameras.rm]
azimuth_deg = -90
[cameras.rf]
azimuth_deg = -45
[cameras.f]
azimuth_deg = 0
[cameras.lf]
azimuth_deg = 45
[cameras.lm]
azimuth_deg = 90
[cameras.lh]
azimuth_deg = 120
