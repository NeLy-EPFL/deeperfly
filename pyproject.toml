[project]
name = "deeperfly"
version = "0.1.0"
description = "JAX multi-view geometry and bundle adjustment for multi-camera rigs"
readme = "README.md"
authors = [
    { name = "tkclam", email = "thomas.lam@epfl.ch" }
]
requires-python = ">=3.13"
dependencies = [
    "jax[cuda13]>=0.10.1",
    "jaxtyping>=0.3.10",
    "numpy>=2.4.6",
    "scipy>=1.14",
    "h5py>=3.11",
    "equinox>=0.11",
    "platformdirs>=4.0",
    # The 2D detector ships two co-equal backends (JAX/Equinox and PyTorch); both
    # are installed by default. torch also converts the original DeepFly2D weights.
    "torch>=2.2",
    "torchvision>=0.17",
]

[project.optional-dependencies]
viz = [
    "matplotlib>=3.10",
    "imageio>=2.34",
    "imageio-ffmpeg>=0.5",
]
# Optional video read/write backends (deeperfly.video). Each is selectable via
# `backend=...`; install the one(s) you want. torch is already a core dependency
# (the second detector backend), so torchcodec/pynvvideocodec only need their own
# bindings. NVIDIA DALI is intentionally not listed -- it ships from NVIDIA's
# package index (e.g. nvidia-dali-cuda120), not PyPI -- but `backend="dali"` is
# used automatically when it is importable.
opencv = ["opencv-python-headless>=4.10"]
pyav = ["av>=12"]
decord = ["decord>=0.6"]              # random-access reader (Linux/Windows wheels)
video-reader-rs = ["video-reader-rs>=0.4"]  # fast Rust/FFmpeg reader with get_batch
torchcodec = ["torchcodec>=0.1"]      # decodes (optionally on GPU/NVDEC) into torch tensors
pynvvideocodec = ["PyNvVideoCodec>=1.0"]  # NVIDIA NVDEC bindings; GPU-only, via DLPack

[project.scripts]
deeperfly = "deeperfly.cli:main"

[build-system]
requires = ["uv_build>=0.11.16,<0.12.0"]
build-backend = "uv_build"

[dependency-groups]
dev = [
    "ipykernel>=7.2.0",
    "matplotlib>=3.10.9",  # examples / notebooks only
]
test = [
    "opencv-python-headless>=4.13.0.92",  # reference cross-checks + opencv video backend
    "pytest>=9.0.3",
    "imageio>=2.34",          # video read/write smoke tests
    "imageio-ffmpeg>=0.5",
    "av>=12",                 # exercise the pyav video backend
]

[tool.pytest.ini_options]
testpaths = ["tests"]
pythonpath = ["tests"]
addopts = "-q"

[tool.ruff.lint]
ignore = ["F722", "F821"]
