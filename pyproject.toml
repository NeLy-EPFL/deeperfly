[project]
name = "deeperfly"
version = "0.1.0"
description = "JAX multi-view geometry and bundle adjustment for multi-camera rigs"
readme = "README.md"
authors = [
    { name = "tkclam", email = "thomas.lam@epfl.ch" }
]
requires-python = ">=3.13"
dependencies = [
    "jax[cuda13]>=0.10.1",
    "jaxtyping>=0.3.10",
    "numpy>=2.4.6",
    "scipy>=1.14",
    "h5py>=3.11",
    "equinox>=0.11",
    "platformdirs>=4.0",
    # The 2D detector ships two co-equal backends (JAX/Equinox and PyTorch); both
    # are installed by default. torch also converts the original DeepFly2D weights.
    "torch>=2.2",
    "torchvision>=0.17",
]

[project.optional-dependencies]
viz = [
    "matplotlib>=3.10",
    "imageio>=2.34",
    "imageio-ffmpeg>=0.5",
]

[project.scripts]
deeperfly = "deeperfly.cli:main"

[build-system]
requires = ["uv_build>=0.11.16,<0.12.0"]
build-backend = "uv_build"

[dependency-groups]
dev = [
    "ipykernel>=7.2.0",
    "matplotlib>=3.10.9",  # examples / notebooks only
]
test = [
    "opencv-python-headless>=4.13.0.92",  # reference implementation cross-checks
    "pytest>=9.0.3",
    "imageio>=2.34",          # video read/write smoke tests
    "imageio-ffmpeg>=0.5",
]

[tool.pytest.ini_options]
testpaths = ["tests"]
pythonpath = ["tests"]
addopts = "-q"

[tool.ruff.lint]
ignore = ["F722", "F821"]
