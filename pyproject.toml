[project]
name = "deeperfly"
version = "0.1.0"
description = "Markerless 3D pose estimation of tethered Drosophila from a multi-camera rig, in JAX"
readme = "README.md"
requires-python = ">=3.13"
license = "GPL-3.0-only"
license-files = ["LICENSE"]
authors = [
    { name = "tkclam", email = "thomas.lam@epfl.ch" },
]
keywords = [
    "pose-estimation",
    "drosophila",
    "neuroscience",
    "jax",
    "bundle-adjustment",
    "triangulation",
    "multi-view-geometry",
]
classifiers = [
    "Development Status :: 4 - Beta",
    "Intended Audience :: Science/Research",
    "Programming Language :: Python :: 3.13",
    "Topic :: Scientific/Engineering :: Image Recognition",
    "Topic :: Scientific/Engineering :: Bio-Informatics",
    "Operating System :: POSIX :: Linux",
    "Operating System :: MacOS",
]
dependencies = [
    # Geometry/BA core (float64, JIT- and grad-friendly). CPU JAX is portable on
    # every platform; NVIDIA CUDA acceleration is opt-in via the `cuda` extra below.
    "jax>=0.10.1",
    # The 2D detector runs on either backend (JAX/Equinox or PyTorch); torch also
    # converts the original DeepFly2D weights and auto-uses Metal (MPS) on Apple
    # Silicon -- the only accelerated detector path on macOS.
    "torch>=2.2",
    "torchvision>=0.17",
    "jaxtyping>=0.3.10",
    "numpy>=2.4.6",
    "scipy>=1.14",
    "h5py>=3.11",
    "equinox>=0.11",
    "platformdirs>=4.0",
    "tqdm>=4.66",          # CLI progress bars (auto-disabled off a TTY / under -q)
    # Visualization + default video I/O, so `deeperfly run` works out of the box.
    "matplotlib>=3.10",
    "imageio>=2.34",
    "imageio-ffmpeg>=0.5",
]

[project.urls]
Homepage = "https://github.com/tkclam/deeperfly"
Repository = "https://github.com/tkclam/deeperfly"
Issues = "https://github.com/tkclam/deeperfly/issues"

[project.scripts]
deeperfly = "deeperfly.cli:main"

[project.optional-dependencies]
# NVIDIA CUDA acceleration: CUDA-13 JAX (detector on the GPU) plus the fastest
# GPU/NVDEC decoder, torchcodec-on-CUDA. CUDA wheels exist for Linux x86-64 only,
# so the markers make this a clean no-op elsewhere. Install with `deeperfly[cuda]`.
# (torch's PyPI wheel already bundles CUDA 13; [tool.uv.sources] routes torchcodec
# to the PyTorch CUDA index, and nvidia-npp gives it GPU colour conversion -- its
# libs are dlopen'd, so no LD_LIBRARY_PATH is needed.)
cuda = [
    "jax[cuda13]>=0.10.1; sys_platform == 'linux' and platform_machine == 'x86_64'",
    "torchcodec>=0.1; sys_platform == 'linux' and platform_machine == 'x86_64'",
    "nvidia-npp>=13; sys_platform == 'linux' and platform_machine == 'x86_64'",
]
# Apple Metal (MPS) acceleration for the JAX detector via the jax-mps plugin
# (experimental, float32-only -- geometry/BA stay float64 on CPU). Apple Silicon
# only. The torch backend already auto-uses Metal on macOS, so use this only to
# stay on the JAX backend. Install with `deeperfly[mps]`.
mps = [
    "jax-mps>=0.10.1; sys_platform == 'darwin' and platform_machine == 'arm64'",
]
# Optional faster video read/write backends (deeperfly.video), each selectable via
# `backend=...`. torch is already core, so torchcodec only needs its own bindings.
opencv = ["opencv-python-headless>=4.10"]
pyav = ["av>=12"]
# decord/video-reader-rs publish Linux/Windows wheels only (no-op on macOS, where
# pyav/opencv/torchcodec cover the same ground).
decord = ["decord>=0.6; sys_platform != 'darwin'"]
video-reader-rs = ["video-reader-rs>=0.4; sys_platform != 'darwin'"]
torchcodec = ["torchcodec>=0.1"]      # decodes (optionally on GPU/NVDEC) into torch tensors
# NVIDIA DALI: frame-accurate GPU (NVDEC) decode. The wheel is CUDA-version
# specific; this pins the CUDA 13 build to match `cuda`. Linux x86-64 only.
dali = ["nvidia-dali-cuda130>=2.1; sys_platform == 'linux' and platform_machine == 'x86_64'"]

# Every cross-platform video backend (each is platform-gated above, so this stays
# installable on Linux/macOS/Windows). Excludes `cuda`/`dali`, which need an NVIDIA
# GPU -- add those explicitly, e.g. `deeperfly[all,cuda]`.
all = [
    "deeperfly[opencv]",
    "deeperfly[pyav]",
    "deeperfly[decord]",
    "deeperfly[video-reader-rs]",
    "deeperfly[torchcodec]",
]

[build-system]
requires = ["uv_build>=0.11.16,<0.12.0"]
build-backend = "uv_build"

[dependency-groups]
dev = ["ipykernel>=7.2.0"]
test = [
    "opencv-python-headless>=4.13.0.92",  # OpenCV cross-checks + opencv video backend
    "pytest>=9.0.3",
    "av>=12",                             # exercises the pyav video backend
]

# CUDA-13 PyTorch index, consulted only for packages routed here by
# [tool.uv.sources] below (never for anything else).
[[tool.uv.index]]
name = "pytorch-cu130"
url = "https://download.pytorch.org/whl/cu130"
explicit = true

# Route torchcodec to the CUDA-13 PyTorch index on Linux x86-64 (its PyPI wheel is
# CPU-only); elsewhere it stays on PyPI. Platform-only marker, so the lock keeps
# both a +cu130 stanza (Linux x86-64) and a PyPI stanza (macOS/Windows/ARM). torch
# itself stays on PyPI -- its wheel already bundles CUDA 13, so the cu130 torchcodec
# is ABI-compatible.
[tool.uv.sources]
torchcodec = [{ index = "pytorch-cu130", marker = "sys_platform == 'linux' and platform_machine == 'x86_64'" }]

[tool.pytest.ini_options]
testpaths = ["tests"]
pythonpath = ["tests"]
addopts = "-q"

[tool.ruff.lint]
ignore = ["F722", "F821"]
