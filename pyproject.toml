[project]
name = "deeperfly"
version = "0.1.0"
description = "JAX multi-view geometry and bundle adjustment for multi-camera rigs"
readme = "README.md"
authors = [
    { name = "tkclam", email = "thomas.lam@epfl.ch" }
]
requires-python = ">=3.13"
dependencies = [
    # JAX CPU baseline -- portable on every platform. NVIDIA CUDA acceleration is
    # opt-in via the `gpu` extra below (CUDA 13 wheels exist for Linux x86-64 only).
    "jax>=0.10.1",
    # The 2D detector can be run on either of two backends (JAX/Equinox and PyTorch);
    # torch also converts the original DeepFly2D weights. On Apple Silicon the torch
    # backend auto-uses the GPU via Metal (MPS) -- the only accelerated detector path
    # on macOS, since JAX stays CPU-only there.
    "torch>=2.2",
    "torchvision>=0.17",
    "jaxtyping>=0.3.10",
    "numpy>=2.4.6",
    "scipy>=1.14",
    "h5py>=3.11",
    "equinox>=0.11",
    "platformdirs>=4.0",
]

[project.optional-dependencies]
# NVIDIA CUDA 13 acceleration for JAX. CUDA wheels are published for Linux
# x86-64 only, so the environment marker makes this a no-op (cleanly skipped)
# on macOS, Windows and ARM. Request it explicitly: `deeperfly[gpu]` (or
# combine, e.g. `deeperfly[all,gpu]`).
gpu = [
    "jax[cuda13]>=0.10.1; sys_platform == 'linux' and platform_machine == 'x86_64'",
]
viz = [
    "matplotlib>=3.10",
    "imageio>=2.34",
    "imageio-ffmpeg>=0.5",
]
# Optional video read/write backends (deeperfly.video). Each is selectable via
# `backend=...`; install the one(s) you want. torch is already a core dependency
# (the second detector backend), so torchcodec/pynvvideocodec only need their own
# bindings. NVIDIA DALI is intentionally not listed -- it ships from NVIDIA's
# package index (e.g. nvidia-dali-cuda120), not PyPI -- but `backend="dali"` is
# used automatically when it is importable.
opencv = ["opencv-python-headless>=4.10"]
pyav = ["av>=12"]
# Random-access reader. decord publishes Linux/Windows wheels only; the
# eva-decord fork has no macOS wheels for current versions / Python 3.13 either.
# Limited to Linux/Windows (no-op on macOS) -- on macOS use pyav/opencv/torchcodec.
decord = ["decord>=0.6; sys_platform != 'darwin'"]
# Fast Rust/FFmpeg reader with get_batch. Wheels published for Linux/Windows
# only at the required version, so gated off macOS (no-op there).
video-reader-rs = ["video-reader-rs>=0.4; sys_platform != 'darwin'"]
torchcodec = ["torchcodec>=0.1"]      # decodes (optionally on GPU/NVDEC) into torch tensors; cross-platform wheels
# NVIDIA NVDEC bindings; GPU-only, so gated to Linux x86-64 (no-op elsewhere).
pynvvideocodec = ["PyNvVideoCodec>=1.0; sys_platform == 'linux' and platform_machine == 'x86_64'"]

# Visualization + every non-NVIDIA video backend. Each backend is platform-gated
# in its own extra above (decord/video-reader-rs are no-ops on macOS), so
# `deeperfly[all]` stays installable on Linux, macOS and Windows. Deliberately
# excluded: `gpu` (NVIDIA CUDA -- add explicitly, e.g. `deeperfly[all,gpu]`) and
# `pynvvideocodec` (NVIDIA NVDEC bindings, Linux x86-64 only).
all = [
    "deeperfly[viz]",
    "deeperfly[opencv]",
    "deeperfly[pyav]",
    "deeperfly[decord]",
    "deeperfly[video-reader-rs]",
    "deeperfly[torchcodec]",
]

[project.scripts]
deeperfly = "deeperfly.cli:main"

[build-system]
requires = ["uv_build>=0.11.16,<0.12.0"]
build-backend = "uv_build"

[dependency-groups]
dev = [
    "ipykernel>=7.2.0",
    "matplotlib>=3.10.9",  # examples / notebooks only
]
test = [
    "opencv-python-headless>=4.13.0.92",  # reference cross-checks + opencv video backend
    "pytest>=9.0.3",
    "imageio>=2.34",          # video read/write smoke tests
    "imageio-ffmpeg>=0.5",
    "av>=12",                 # exercise the pyav video backend
]

[tool.pytest.ini_options]
testpaths = ["tests"]
pythonpath = ["tests"]
addopts = "-q"

[tool.ruff.lint]
ignore = ["F722", "F821"]
