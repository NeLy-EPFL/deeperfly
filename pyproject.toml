[project]
name = "deeperfly"
version = "0.1.0"
description = "JAX multi-view geometry and bundle adjustment for multi-camera rigs"
readme = "README.md"
authors = [
    { name = "tkclam", email = "thomas.lam@epfl.ch" }
]
requires-python = ">=3.13"
dependencies = [
    "jax>=0.10.1",
    "jaxtyping>=0.3.10",
    "numpy>=2.4.6",
    "scipy>=1.14",
]

[project.scripts]
deeperfly = "deeperfly:main"

[build-system]
requires = ["uv_build>=0.11.16,<0.12.0"]
build-backend = "uv_build"

[dependency-groups]
dev = [
    "ipykernel>=7.2.0",
    "matplotlib>=3.10.9",  # examples / notebooks only
]
test = [
    "opencv-python-headless>=4.13.0.92",  # reference implementation cross-checks
    "pytest>=9.0.3",
]

[tool.pytest.ini_options]
testpaths = ["tests"]
pythonpath = ["tests"]
addopts = "-q"

[tool.ruff.lint]
ignore = ["F722", "F821"]
