[project]
name = "deeperfly"
version = "0.1.0"
description = "Markerless 3D pose estimation of tethered Drosophila from a multi-camera rig, in JAX"
readme = "README.md"
requires-python = ">=3.13"
license = "GPL-3.0-only"
license-files = ["LICENSE"]
authors = [
    { name = "tkclam", email = "thomas.lam@epfl.ch" },
]
keywords = [
    "pose-estimation",
    "drosophila",
    "neuroscience",
    "jax",
    "bundle-adjustment",
    "triangulation",
    "multi-view-geometry",
]
classifiers = [
    "Development Status :: 4 - Beta",
    "Intended Audience :: Science/Research",
    "Programming Language :: Python :: 3.13",
    "Topic :: Scientific/Engineering :: Image Recognition",
    "Topic :: Scientific/Engineering :: Bio-Informatics",
    "Operating System :: POSIX :: Linux",
    "Operating System :: MacOS",
]
dependencies = [
    # Geometry/BA core (float64, JIT- and grad-friendly), kept on the CPU -- the
    # arrays are tiny, so a GPU never helps. CPU JAX is portable on every platform
    # and is the only JAX deeperfly installs (the detector is PyTorch).
    "jax>=0.10.1",
    # The 2D detector (PyTorch). torch loads the original DeepFly2D weights
    # directly, uses CUDA on NVIDIA GPUs (its PyPI wheel already bundles CUDA), and
    # auto-uses Metal (MPS) on Apple Silicon -- so no extra is needed for either.
    "torch>=2.2",
    "torchvision>=0.17",
    "jaxtyping>=0.3.10",
    "numpy>=2.4.6",
    "scipy>=1.14",
    "h5py>=3.11",
    "platformdirs>=4.0",
    "rich>=14.0",
    "typer>=0.26",
    "matplotlib>=3.10",
    "av>=13",
    "imageio>=2.34",
    "opencv-python-headless>=4.13",
    "natsort>=8.4.0",
]

[project.urls]
Homepage = "https://github.com/NeLy-EPFL/deeperfly"
Repository = "https://github.com/NeLy-EPFL/deeperfly"
Issues = "https://github.com/NeLy-EPFL/deeperfly/issues"

[project.scripts]
deeperfly = "deeperfly.cli:main"

[project.optional-dependencies]
# NVIDIA CUDA acceleration for video decode: the fastest GPU/NVDEC decoder,
# torchcodec-on-CUDA, plus GPU colour conversion. The detector itself runs on the
# GPU through torch's own CUDA wheel, so no JAX-CUDA is needed here. CUDA wheels
# exist for Linux x86-64 only, so the markers make this a clean no-op elsewhere.
# Install with `deeperfly[cuda]`. (torch's PyPI wheel already bundles CUDA 13;
# [tool.uv.sources] routes torchcodec to the PyTorch CUDA index, and nvidia-npp
# gives it GPU colour conversion -- its libs are dlopen'd, so no LD_LIBRARY_PATH
# is needed.)
cuda = [
    "torchcodec>=0.1; sys_platform == 'linux' and platform_machine == 'x86_64'",
    "nvidia-npp>=13; sys_platform == 'linux' and platform_machine == 'x86_64'",
]
# Optional faster/alternative video read/write backends (deeperfly.video), each
# selectable via `backend=...`. PyAV is core (the default), so it is not repeated
# here. torch is already core, so torchcodec only needs its own bindings.
# video-reader-rs publishes Linux/Windows wheels only (no-op on macOS, where
# pyav/opencv/torchcodec cover the same ground).
video-reader-rs = ["video-reader-rs>=0.4; sys_platform != 'darwin'"]
torchcodec = ["torchcodec>=0.1"]      # decodes (optionally on GPU/NVDEC) into torch tensors
# NVIDIA DALI: frame-accurate GPU (NVDEC) decode. The wheel is CUDA-version
# specific; this pins the CUDA 13 build to match `cuda`. Linux x86-64 only.
dali = ["nvidia-dali-cuda130>=2.1; sys_platform == 'linux' and platform_machine == 'x86_64'"]

[build-system]
requires = ["uv_build>=0.11.16,<0.12.0"]
build-backend = "uv_build"

[dependency-groups]
dev = [
    "ipykernel>=7.2.0",
    "polars>=1.41.2",
]
test = [
    "pytest>=9.0.3",
]

# CUDA-13 PyTorch index, consulted only for packages routed here by
# [tool.uv.sources] below (never for anything else).
[[tool.uv.index]]
name = "pytorch-cu130"
url = "https://download.pytorch.org/whl/cu130"
explicit = true

# Route torchcodec to the CUDA-13 PyTorch index on Linux x86-64 (its PyPI wheel is
# CPU-only); elsewhere it stays on PyPI. Platform-only marker, so the lock keeps
# both a +cu130 stanza (Linux x86-64) and a PyPI stanza (macOS/Windows/ARM). torch
# itself stays on PyPI -- its wheel already bundles CUDA 13, so the cu130 torchcodec
# is ABI-compatible.
[tool.uv.sources]
torchcodec = [{ index = "pytorch-cu130", marker = "sys_platform == 'linux' and platform_machine == 'x86_64'" }]

[tool.pytest.ini_options]
testpaths = ["tests"]
pythonpath = ["tests"]
addopts = "-q"

[tool.ruff.lint]
ignore = ["F722", "F821"]
