[project]
name = "deeperfly"
version = "0.1.0"
description = "Add your description here"
readme = "README.md"
authors = [
    { name = "tkclam", email = "thomas.lam@epfl.ch" }
]
requires-python = ">=3.13"
dependencies = [
    "jax>=0.10.1",
    "lineax>=0.1.1",
    "matplotlib>=3.10.9",
    "numpy>=2.4.6",
    "optimistix>=0.1.0",
    "scipy>=1.14",
]

[project.scripts]
deeperfly = "deeperfly:main"

[build-system]
requires = ["uv_build>=0.11.16,<0.12.0"]
build-backend = "uv_build"

[dependency-groups]
dev = [
    "ipykernel>=7.2.0",
]

[tool.ruff.lint]
ignore = ["F722", "F821"]
