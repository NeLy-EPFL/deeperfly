# deeperfly run configuration -- a single self-contained file.
#
# Bundles everything one run needs: the 2D detection plan (sources ->
# preprocessors -> models -> pathways, with [point_sources] saying where each
# tracked point's data comes from), the camera rig, the skeleton, and the
# pipeline. Run with:
#
#     deeperfly run recording/ -c config.toml -o outputs/
#     # -c defaults to this packaged config; -o defaults to <recording>/deeperfly_outputs/
#
# Every section is also usable on its own: CameraGroup.from_config reads only
# [cameras.*], Skeleton.from_config only [skeleton] -- foreign sections are ignored.


# ===========================================================================
# 2D detection plan, decoupled into four lists whose counts may all differ:
#   [[sources]]       -- named footage globs, each decoded once
#   [[preprocessors]] -- named, reusable frame-op pipelines (mirror/crop/resize)
#   [[models]]        -- detector models (class + weights + input contract)
#   [[pathways]]      -- a named source -> preprocessor -> model inference run
# Where each pathway's output channels land is declared separately, in the
# [point_sources.<view>] tables near the bottom of the file.
# ===========================================================================
[[sources]]            # name -> footage glob (a file, prefix, or wildcard)
name = "vid_rh"
filename = "camera_0.mp4"
[[sources]]
name = "vid_rm"
filename = "camera_1.mp4"
[[sources]]
name = "vid_rf"
filename = "camera_2.mp4"
[[sources]]
name = "vid_f"
filename = "camera_3.mp4"
[[sources]]
name = "vid_lf"
filename = "camera_4.mp4"
[[sources]]
name = "vid_lm"
filename = "camera_5.mp4"
[[sources]]
name = "vid_lh"
filename = "camera_6.mp4"

[io.image]
workers = 0   # decode threads (0 = auto, one per CPU)

# Named preprocessors: an ordered op list applied to a pathway's frames before
# the model. The detector's points are mapped back into the view frame by
# inverting these ops, so a mirror here never moves the reconstructed skeleton.
# Ops: { op = "fliplr" } / { op = "flipud" } / { op = "rot90", k = 1 } /
#      { op = "crop", x=, y=, width=, height= } / { op = "resize", scale= }.
[[preprocessors]]
name = "noflip"
ops = []
[[preprocessors]]
name = "fliplr"
ops = [{ op = "fliplr" }]

# Models: `class` selects the network ("hourglass" = DeepFly2D); `weights` is a
# checkpoint path ("" / omitted uses the auto-provisioned cache); `input_size`
# (height, width) is the frame size the network was trained on -- every frame is
# resized to it before inference and the output peaks are scaled back out of it,
# so it cannot be inferred; `mean` is subtracted after /255; `n_out_channels` is
# the output heatmap count (validated against the weights).
[[models]]
name = "deepfly2d"
class = "hourglass"
weights = ""
input_size = [256, 512]
mean = 0.22
n_out_channels = 19

# Pathways: each a named source -> preprocessor -> model run. A pathway just says
# what to detect on; where its output channels land is in [point_sources] below.
# The front source feeds two pathways (one mirrored). Each pathway needs a unique
# `name` so [point_sources] can reference it.
[[pathways]]
name = "rh_noflip"
source = "vid_rh"
preprocessor = "noflip"
model = "deepfly2d"

[[pathways]]
name = "rm_noflip"
source = "vid_rm"
preprocessor = "noflip"
model = "deepfly2d"

[[pathways]]
name = "rf_noflip"
source = "vid_rf"
preprocessor = "noflip"
model = "deepfly2d"

[[pathways]]
name = "f_noflip"
source = "vid_f"
preprocessor = "noflip"
model = "deepfly2d"

[[pathways]]
name = "f_fliplr"
source = "vid_f"
preprocessor = "fliplr"
model = "deepfly2d"

[[pathways]]
name = "lf_fliplr"
source = "vid_lf"
preprocessor = "fliplr"
model = "deepfly2d"

[[pathways]]
name = "lm_fliplr"
source = "vid_lm"
preprocessor = "fliplr"
model = "deepfly2d"

[[pathways]]
name = "lh_fliplr"
source = "vid_lh"
preprocessor = "fliplr"
model = "deepfly2d"

# ===========================================================================
# Skeleton: the tracked points and their structure (DeepFly3D 7-camera rig). 38
# points = 19 per side (L = 0..18, R = 19..37): three 5-point legs, one antenna
# and three abdominal markers per side. `limb_points` groups the points into 10
# named limbs, each a kinematic chain; `limb_palette` gives each limb its
# plotting color. Edit to track a different animal.
# ===========================================================================
[skeleton]
name = "fly38"

point_names = [
    "lf_thorax_coxa", "lf_coxa_trochanter", "lf_femur_tibia", "lf_tibia_tarsus", "lf_claw",
    "lm_thorax_coxa", "lm_coxa_trochanter", "lm_femur_tibia", "lm_tibia_tarsus", "lm_claw",
    "lh_thorax_coxa", "lh_coxa_trochanter", "lh_femur_tibia", "lh_tibia_tarsus", "lh_claw",
    "l_antenna", "l_abdomen0", "l_abdomen1", "l_abdomen2",
    "rf_thorax_coxa", "rf_coxa_trochanter", "rf_femur_tibia", "rf_tibia_tarsus", "rf_claw",
    "rm_thorax_coxa", "rm_coxa_trochanter", "rm_femur_tibia", "rm_tibia_tarsus", "rm_claw",
    "rh_thorax_coxa", "rh_coxa_trochanter", "rh_femur_tibia", "rh_tibia_tarsus", "rh_claw",
    "r_antenna", "r_abdomen0", "r_abdomen1", "r_abdomen2",
]

# Limbs: each entry lists a limb's tracked points (by name) in kinematic-chain order.
[skeleton.limb_points]
lf_leg = ["lf_thorax_coxa", "lf_coxa_trochanter", "lf_femur_tibia", "lf_tibia_tarsus", "lf_claw"]
lm_leg = ["lm_thorax_coxa", "lm_coxa_trochanter", "lm_femur_tibia", "lm_tibia_tarsus", "lm_claw"]
lh_leg = ["lh_thorax_coxa", "lh_coxa_trochanter", "lh_femur_tibia", "lh_tibia_tarsus", "lh_claw"]
l_antenna = ["l_antenna"]
l_abdomen = ["l_abdomen0", "l_abdomen1", "l_abdomen2"]
rf_leg = ["rf_thorax_coxa", "rf_coxa_trochanter", "rf_femur_tibia", "rf_tibia_tarsus", "rf_claw"]
rm_leg = ["rm_thorax_coxa", "rm_coxa_trochanter", "rm_femur_tibia", "rm_tibia_tarsus", "rm_claw"]
rh_leg = ["rh_thorax_coxa", "rh_coxa_trochanter", "rh_femur_tibia", "rh_tibia_tarsus", "rh_claw"]
r_antenna = ["r_antenna"]
r_abdomen = ["r_abdomen0", "r_abdomen1", "r_abdomen2"]

# Per-limb plotting color (hex). Legs read left = blue / right = red, lightening
# front -> hind. Limbs without an entry fall back to a default colormap.
[skeleton.limb_palette]
lf_leg = "#0f7399"
lm_leg = "#1a8daf"
lh_leg = "#75becb"
l_antenna = "#0a4f6b"
l_abdomen = "#a9dbe4"
rf_leg = "#ba1e31"
rm_leg = "#c9564f"
rh_leg = "#d58579"
r_antenna = "#8c1525"
r_abdomen = "#e6b3a8"


# ===========================================================================
# Views: the geometric cameras a pathway maps its points back into -- an array
# of views orbiting an object near the world origin. Each `[cameras.<name>]` holds
# only geometry (intrinsics + the orbit extrinsics); its footage comes from the
# pathway's source, and its intrinsics describe that source's raw frame.
# `[cameras.defaults]` is merged into every view; per-view keys override it.
# ===========================================================================
[cameras.defaults]
focal_length_px = [22388.125, 22388.125]    # scalar also allowed when fx == fy

# optional; omit to use each view's image center ((w-1)/2, (h-1)/2). Set it only
# when the principal point is not at the image center.
# principal_point_px = [479.5, 239.5]

distortion_coefficients = []  # empty means no distortion
look_at = [0.0, 0.0, 0.0]
distance = 107.463
elevation_deg = 0.0
roll_deg = 0.0

[cameras.rh]
azimuth_deg = -120
[cameras.rm]
azimuth_deg = -90
[cameras.rf]
azimuth_deg = -45
[cameras.f]
azimuth_deg = 0
[cameras.lf]
azimuth_deg = 45
[cameras.lm]
azimuth_deg = 90
[cameras.lh]
azimuth_deg = 120

# ===========================================================================
# point_sources: for each view, where every tracked point's data comes from.
# `point = { pathway, out_channel }` fills that point of the view from output
# channel `out_channel` of the named pathway. Keying by (view, point) means each
# point has exactly one source (a repeat is an error); a (view, point) left out
# stays unobserved (NaN) -- that union is the visibility mask. The front view is
# filled by two pathways: the un-flipped pass supplies the right distal joints,
# the mirrored pass the left.
